services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: honda_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - honda_network
    depends_on:
      - postgres

  nginx:
    image: nginx:alpine
    container_name: honda_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - honda_network
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: honda_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: honda_test
      POSTGRES_USER: root
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - honda_network

volumes:
  postgres_data:

networks:
  honda_network:
    driver: bridge
